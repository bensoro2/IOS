workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      node: 22
      vars:
        BUNDLE_ID: "com.levelon.app"
        APPLE_TEAM_ID: $APPLE_TEAM_ID
    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          CERT_KEY=$(openssl genrsa 2048)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERT_KEY"

      - name: Add certs to keychain
        script: keychain add-certificates

      - name: Install dependencies
        script: npm install --fetch-timeout=300000 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Build web
        script: npm run build

      - name: Add iOS platform
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap copy ios
          echo "=== Podfile location check ==="
          find ios -name "Podfile" -not -path "*/Pods/*" || echo "No Podfile found"

      - name: Add GoogleService-Info.plist and Firebase Messaging pod
        script: |
          set -e

          # Write the plist file
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist written"

          # Find Podfile dynamically
          PODFILE=$(find ios -name "Podfile" -not -path "*/Pods/*" | head -1)
          echo "Podfile found at: $PODFILE"

          # If Podfile not found, create it from base64
          if [ -z "$PODFILE" ]; then
            PODFILE="ios/App/Podfile"
            echo "Creating Podfile at $PODFILE"
            echo "" | base64 --decode > "$PODFILE"
            echo "Podfile created"
          else
            # Add Firebase/Messaging to existing Podfile
            if ! grep -q "Firebase/Messaging" "$PODFILE"; then
              python3 -c "
content = open('$PODFILE').read()
content = content.replace('  # Add your Pods here', \"  pod 'Firebase/Messaging'\n  # Add your Pods here\")
open('$PODFILE', 'w').write(content)
print('Added Firebase/Messaging to Podfile')
"
            fi
          fi

          # Add plist to Xcode project
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.first
          group = project.main_group['App']
          unless group.files.map(&:path).include?('GoogleService-Info.plist')
            file_ref = group.new_file('GoogleService-Info.plist')
            target.add_file_references([file_ref])
            puts "Added GoogleService-Info.plist to Xcode project"
          end
          project.save
          RUBY
          cd ../..

          # Add Firebase initialization to AppDelegate.swift
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          if ! grep -q "import Firebase" "$APPDELEGATE"; then
            sed -i '' 's/import UIKit/import UIKit\nimport Firebase/' "$APPDELEGATE"
            sed -i '' 's/return true/FirebaseApp.configure()\n    return true/' "$APPDELEGATE"
            echo "Firebase configured in AppDelegate.swift"
          fi

          # Install pods
          cd ios/App && pod install && cd ../..

      - name: Generate app icons
        script: |
          ICON_SRC="image.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          sips -z 20   20   "$ICON_SRC" --out "$ICON_DIR/Icon-20.png"
          sips -z 29   29   "$ICON_SRC" --out "$ICON_DIR/Icon-29.png"
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/Icon-40.png"
          sips -z 58   58   "$ICON_SRC" --out "$ICON_DIR/Icon-58.png"
          sips -z 60   60   "$ICON_SRC" --out "$ICON_DIR/Icon-60.png"
          sips -z 76   76   "$ICON_SRC" --out "$ICON_DIR/Icon-76.png"
          sips -z 80   80   "$ICON_SRC" --out "$ICON_DIR/Icon-80.png"
          sips -z 87   87   "$ICON_SRC" --out "$ICON_DIR/Icon-87.png"
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/Icon-120.png"
          sips -z 152  152  "$ICON_SRC" --out "$ICON_DIR/Icon-152.png"
          sips -z 167  167  "$ICON_SRC" --out "$ICON_DIR/Icon-167.png"
          sips -z 180  180  "$ICON_SRC" --out "$ICON_DIR/Icon-180.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/Icon-1024.png"

          cat > "$ICON_DIR/Contents.json" << 'CONTENTS'
          {
            "images": [
              {"filename": "Icon-20.png",   "idiom": "iphone", "scale": "1x", "size": "20x20"},
              {"filename": "Icon-40.png",   "idiom": "iphone", "scale": "2x", "size": "20x20"},
              {"filename": "Icon-60.png",   "idiom": "iphone", "scale": "3x", "size": "20x20"},
              {"filename": "Icon-29.png",   "idiom": "iphone", "scale": "1x", "size": "29x29"},
              {"filename": "Icon-58.png",   "idiom": "iphone", "scale": "2x", "size": "29x29"},
              {"filename": "Icon-87.png",   "idiom": "iphone", "scale": "3x", "size": "29x29"},
              {"filename": "Icon-80.png",   "idiom": "iphone", "scale": "2x", "size": "40x40"},
              {"filename": "Icon-120.png",  "idiom": "iphone", "scale": "3x", "size": "40x40"},
              {"filename": "Icon-120.png",  "idiom": "iphone", "scale": "2x", "size": "60x60"},
              {"filename": "Icon-180.png",  "idiom": "iphone", "scale": "3x", "size": "60x60"},
              {"filename": "Icon-20.png",   "idiom": "ipad",   "scale": "1x", "size": "20x20"},
              {"filename": "Icon-40.png",   "idiom": "ipad",   "scale": "2x", "size": "20x20"},
              {"filename": "Icon-29.png",   "idiom": "ipad",   "scale": "1x", "size": "29x29"},
              {"filename": "Icon-58.png",   "idiom": "ipad",   "scale": "2x", "size": "29x29"},
              {"filename": "Icon-40.png",   "idiom": "ipad",   "scale": "1x", "size": "40x40"},
              {"filename": "Icon-80.png",   "idiom": "ipad",   "scale": "2x", "size": "40x40"},
              {"filename": "Icon-76.png",   "idiom": "ipad",   "scale": "1x", "size": "76x76"},
              {"filename": "Icon-152.png",  "idiom": "ipad",   "scale": "2x", "size": "76x76"},
              {"filename": "Icon-167.png",  "idiom": "ipad",   "scale": "2x", "size": "83.5x83.5"},
              {"filename": "Icon-1024.png", "idiom": "ios-marketing", "scale": "1x", "size": "1024x1024"}
            ],
            "info": {"author": "xcode", "version": 1}
          }
          CONTENTS

      - name: Add custom URL scheme and permissions to Info.plist
        script: |
          python3 - << 'EOF'
          import plistlib
          path = 'ios/App/App/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)

          # Add custom URL scheme for OAuth deep link
          scheme = 'com.levelon.app'
          url_types = plist.get('CFBundleURLTypes', [])
          has_scheme = any(scheme in e.get('CFBundleURLSchemes', []) for e in url_types)
          if not has_scheme:
              url_types.append({'CFBundleTypeRole': 'Editor', 'CFBundleURLName': scheme, 'CFBundleURLSchemes': [scheme]})
              plist['CFBundleURLTypes'] = url_types
              print('URL scheme added')
          else:
              print('URL scheme already exists')

          # Add microphone permission (required for audio recording in chat)
          if 'NSMicrophoneUsageDescription' not in plist:
              plist['NSMicrophoneUsageDescription'] = 'ใช้ไมโครโฟนสำหรับบันทึกข้อความเสียงในแชท'
              print('Microphone permission added')
          else:
              print('Microphone permission already exists')

          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('Info.plist updated successfully')
          EOF

      - name: Use provisioning profiles
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist

      - name: Verify project
        script: |
          echo "=== ios/App contents ==="
          ls ios/App/
          echo "=== Schemes ==="
          xcodebuild -list -project ios/App/App.xcodeproj 2>&1

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - levelon.app@gmail.com
        notify:
          success: true
          failure: true
