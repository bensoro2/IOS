workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      node: 22
      vars:
        BUNDLE_ID: "com.levelon.app"
        APPLE_TEAM_ID: $APPLE_TEAM_ID
    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          CERT_KEY=$(openssl genrsa 2048)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERT_KEY"

      - name: Add certs to keychain
        script: keychain add-certificates

      - name: Install dependencies
        script: npm install --fetch-timeout=300000 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Build web
        script: npm run build

      - name: Add iOS platform
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap copy ios

      - name: Add custom URL scheme to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.levelon.app" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.levelon.app" "$PLIST"

      - name: Use provisioning profiles
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - levelon.app@gmail.com
        notify:
          success: true
          failure: true
