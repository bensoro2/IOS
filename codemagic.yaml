workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      node: 22
      vars:
        BUNDLE_ID: "com.levelon.app"
        APPLE_TEAM_ID: $APPLE_TEAM_ID
    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          CERT_KEY=$(openssl genrsa 2048)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERT_KEY"

      - name: Add certs to keychain
        script: keychain add-certificates

      - name: Install dependencies
        script: npm install --fetch-timeout=300000 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Build web
        script: npm run build

      - name: Add iOS platform
        script: |
          set -e
          rm -rf ios
          npx cap add ios
          npx cap copy ios

      - name: Add custom URL scheme to Info.plist
        script: |
          python3 - << 'EOF'
          import plistlib
          path = 'ios/App/App/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)
          scheme = 'com.levelon.app'
          url_types = plist.get('CFBundleURLTypes', [])
          for entry in url_types:
              if scheme in entry.get('CFBundleURLSchemes', []):
                  print('URL scheme already exists')
                  exit(0)
          url_types.append({'CFBundleTypeRole': 'Editor', 'CFBundleURLName': scheme, 'CFBundleURLSchemes': [scheme]})
          plist['CFBundleURLTypes'] = url_types
          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('URL scheme added successfully')
          EOF

      - name: Use provisioning profiles
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist

      - name: Verify project
        script: |
          echo "=== ios/App contents ==="
          ls ios/App/
          echo "=== Schemes ==="
          xcodebuild -list -project ios/App/App.xcodeproj 2>&1

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - levelon.app@gmail.com
        notify:
          success: true
          failure: true
